# Release: on a version tag (v*) -> build image, deploy to PRODUCTION.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use the tag name (e.g. v1.0.0) as the image tag.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      # Update the PRODUCTION deployment with the release tag.
      - name: Update production config
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/arasrasouli/node-gitops-config.git config
          cd config
          sed -i "s|image: ghcr.io/arasrasouli/node-gitops-app:.*|image: ghcr.io/arasrasouli/node-gitops-app:${{ github.ref_name }}|" production/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@example.com"
          git add production/deployment.yaml
          git commit -m "production: release ${{ github.ref_name }}"
          git push