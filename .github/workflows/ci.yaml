# CI pipeline: runs on every push to master.
# 1) test
# 2) build image tagged with the build number, push to ghcr
# 3) update the image tag in the config repo so ArgoCD deploys it

name: CI

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image tagged with the build number (github.run_number).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.run_number }}

      # Clone the config repo, update the image tag in deployment.yaml, push.
      - name: Update config repo
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/arasrasouli/node-gitops-config.git config
          cd config
          # Replace the image line with the new build number tag.
          sed -i "s|image: ghcr.io/arasrasouli/node-gitops-app:.*|image: ghcr.io/arasrasouli/node-gitops-app:${{ github.run_number }}|" deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@example.com"
          git add deployment.yaml
          git commit -m "Update image to build ${{ github.run_number }}"
          git push