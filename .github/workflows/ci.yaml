# CI:
#  - On a PR to master: run tests only (the gate before merge).
#  - On push to master (i.e. after merge): test + build + deploy to staging.
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # Runs on BOTH pull_request and push. Always tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  # Runs ONLY on push to master (after merge). Needs tests to pass first.
  build-and-deploy-staging:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.run_number }}
      - name: Update staging config
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/arasrasouli/node-gitops-config.git config
          cd config
          sed -i "s|image: ghcr.io/arasrasouli/node-gitops-app:.*|image: ghcr.io/arasrasouli/node-gitops-app:${{ github.run_number }}|" staging/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@example.com"
          git add staging/deployment.yaml
          git commit -m "staging: update image to build ${{ github.run_number }}"
          git push