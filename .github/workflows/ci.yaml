# CI: on every push to master -> test, build image, deploy to STAGING.
name: CI

on:
  push:
    branches: [master]

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.run_number }}

      # Update the STAGING deployment with the new build number.
      - name: Update staging config
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/arasrasouli/node-gitops-config.git config
          cd config
          sed -i "s|image: ghcr.io/arasrasouli/node-gitops-app:.*|image: ghcr.io/arasrasouli/node-gitops-app:${{ github.run_number }}|" staging/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@example.com"
          git add staging/deployment.yaml
          git commit -m "staging: update image to build ${{ github.run_number }}"
          git push