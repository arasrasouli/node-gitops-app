# CI pipeline: runs on every push to main.
# 1) install deps and run tests
# 2) if tests pass, build the Docker image
# 3) push the image to GitHub Container Registry (ghcr.io)

name: CI

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    # Permission needed to push images to ghcr.io.
    permissions:
      contents: read
      packages: write

    steps:
      # Get the code.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Node and run the tests.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # Log in to GitHub Container Registry using the built-in token.
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image and tag it with the short commit SHA and 'latest'.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
